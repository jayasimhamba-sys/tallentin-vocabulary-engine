<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TALLENTIN Vocabulary Finder V3</title>
<style>
:root{
  --ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--card:#fff;
  --blue:#2563eb;--blue2:#dbeafe;--green:#059669;--green2:#d1fae5;
  --amber:#d97706;--amber2:#fef3c7;--red:#dc2626;--red2:#fee2e2;
  --purple:#7c3aed;--purple2:#ede9fe;--dark:#111827;
  --shadow:0 18px 55px rgba(15,23,42,.08);--r:24px
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:radial-gradient(circle at top left,#eaf2ff 0,#f8fafc 36%,#fff 100%);
  color:var(--ink)
}
.wrap{max-width:1240px;margin:auto;padding:24px 18px 72px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:10px;font-weight:950;letter-spacing:-.02em}
.brand-mark{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:grid;place-items:center;color:white;box-shadow:var(--shadow)}
.mode-toggle{display:flex;gap:8px;background:white;border:1px solid var(--line);border-radius:999px;padding:6px;box-shadow:0 8px 30px rgba(15,23,42,.05)}
.mode-btn{border:0;background:transparent;border-radius:999px;padding:9px 13px;font-weight:900;cursor:pointer;color:#334155}
.mode-btn.active{background:var(--dark);color:#fff}
.hero{text-align:center;padding:30px 0 18px}
.version-pill{display:inline-flex;gap:7px;align-items:center;padding:8px 13px;border:1px solid var(--line);background:white;border-radius:999px;box-shadow:var(--shadow);font-weight:900;color:var(--muted);font-size:13px}
h1{font-size:clamp(34px,5vw,62px);line-height:1.02;letter-spacing:-.055em;margin:18px auto 12px;max-width:980px}
.hero p{max-width:880px;margin:auto;color:var(--muted);line-height:1.65;font-size:17px}
.search-card{position:relative;background:rgba(255,255,255,.96);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:32px;padding:18px;margin:20px auto;max-width:1040px}
.search-row{display:grid;grid-template-columns:1fr 150px;gap:10px}
input,select{font-family:inherit}
#q{height:62px;border:1.5px solid var(--ink);border-radius:22px;padding:0 20px;font-size:18px;outline:none;background:white}
#q:focus{border-color:#93c5fd;box-shadow:0 0 0 5px rgba(37,99,235,.1)}
button{border:0;cursor:pointer;border-radius:22px;font-weight:950;font-family:inherit}
.primary{background:var(--dark);color:white;font-size:16px}
.secondary{border:1px solid var(--line);background:white;color:var(--ink);padding:10px 12px}
.secondary:hover{background:#f8fafc}
.suggestions{display:none;position:absolute;left:18px;right:178px;top:90px;background:white;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);z-index:20;max-height:390px;overflow:auto;padding:12px}
.suggestions.show{display:block}
.suggest-group{margin-bottom:10px}
.suggest-title{text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:var(--muted);font-weight:950;margin:6px 8px}
.suggest-item{display:flex;justify-content:space-between;gap:10px;padding:10px;border-radius:14px;cursor:pointer}
.suggest-item:hover{background:#eff6ff}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
#chips,#recent{display:none}
.chip,.pill{padding:8px 11px;border:1px solid var(--line);border-radius:999px;background:#f8fafc;color:#334155;font-weight:850;font-size:13px;cursor:pointer}
.chip:hover,.pill:hover{background:var(--blue2);color:var(--blue);border-color:#bfdbfe}
.counts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.badge{display:inline-flex;padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px;font-weight:950;align-items:center}
.good{background:var(--green2);color:var(--green);border-color:#a7f3d0}
.blue{background:var(--blue2);color:var(--blue);border-color:#bfdbfe}
.warn{background:var(--amber2);color:var(--amber);border-color:#fde68a}
.bad{background:var(--red2);color:var(--red);border-color:#fecaca}
.purple{background:var(--purple2);color:var(--purple);border-color:#ddd6fe}
.neutral{background:#f1f5f9;color:#475569}
.grid{display:grid;grid-template-columns:1fr 365px;gap:18px;align-items:start}
.grid.is-v2-fullwidth{grid-template-columns:1fr}
.grid.is-v2-fullwidth #side{display:none}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .big{font-size:56px}
.interpret{background:#0f172a;color:white;border-radius:24px;padding:16px 18px;margin-bottom:18px;box-shadow:var(--shadow)}
.interpret h3{margin:0 0 8px;font-size:15px;color:#bfdbfe}
.interpret .parts{display:flex;flex-wrap:wrap;gap:8px}
.interpret .part{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);padding:8px 10px;border-radius:999px;font-size:13px;font-weight:850}
.title-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.id{font-size:12px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;font-weight:950}
.title-row h2{font-size:38px;letter-spacing:-.04em;margin:4px 0 8px}
.meta{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
.answer{margin-top:15px;background:#f8fafc;border:1px solid var(--line);border-radius:22px;padding:18px;font-size:18px;color:#334155;line-height:1.65}
.action-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:950}
.tab.active{background:var(--dark);color:#fff}
.panel{display:none}
.panel.active{display:block}
.list{display:flex;flex-wrap:wrap;gap:8px}
.cluster{border:1px solid var(--line);background:#fbfdff;border-radius:20px;padding:15px;margin-bottom:12px}
.cluster h4{text-transform:capitalize;margin:0 0 10px}
.kv{display:grid;grid-template-columns:128px 1fr;gap:10px;border-top:1px solid #f1f5f9;padding:12px 0}
.kv:first-child{border:0}
.k{text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:var(--muted);font-weight:950}
.v{color:#334155;line-height:1.55}
.note{padding:15px;border-radius:18px;line-height:1.55}
.note.good{background:var(--green2);border:1px solid #a7f3d0;color:#065f46}
.note.warn{background:var(--amber2);border:1px solid #fde68a;color:#92400e}
.draft-banner{background:var(--amber2);border:1px solid #fde68a;color:#92400e;font-size:12.5px;font-weight:700;padding:8px 12px;border-radius:12px;margin-bottom:12px}
.flag-wrap{margin-top:12px}
.flag-box{margin-top:10px}
.flag-box textarea{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:12px;padding:10px;font:inherit;resize:vertical}
.flag-actions{display:flex;gap:8px;margin-top:8px}
.flag-msg{margin-top:10px;font-size:13px;font-weight:700}
.flag-msg.good{color:#065f46}
.flag-msg.warn{color:#92400e}
.note.blue{background:var(--blue2);border:1px solid #bfdbfe;color:#1d4ed8}
.side-title{font-weight:950;margin:0 0 10px}
.small{font-size:13px;color:var(--muted);line-height:1.55}
.result{border:1px solid var(--line);background:white;border-radius:18px;padding:13px;margin-bottom:9px;cursor:pointer}
.result:hover{background:#f8fafc}
.result small{display:block;color:var(--muted);margin-top:5px}
.compare-box{display:none}
.compare-box.show{display:block}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.compare-card{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fbfdff}
.footer{text-align:center;color:var(--muted);font-size:13px;line-height:1.6;margin-top:20px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111827;color:white;padding:12px 16px;border-radius:999px;box-shadow:var(--shadow);display:none;z-index:50;font-weight:850}
.toast.show{display:block}
@media(max-width:900px){
  .grid,.two-col,.compare-grid{grid-template-columns:1fr}
  .search-row{grid-template-columns:1fr}
  .suggestions{left:18px;right:18px;top:154px}
  .title-row{flex-direction:column}
  .meta{justify-content:flex-start}
  .kv{grid-template-columns:1fr}
  .topbar{flex-direction:column;align-items:flex-start}
}
</style>

<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><div class="brand-mark">T</div><div>TALLENTIN Vocabulary Finder</div></div>
    <div class="mode-toggle" aria-label="Mode toggle">
      <button class="mode-btn active" id="simpleBtn" onclick="setMode('simple')">Simple Mode</button>

  </div>
</div>

<script>
  // Supabase client for anonymous term-flag submissions (INSERT-only; table locked down)
  const SUPABASE_URL = "https://cosgqxnhcdarjgynnyiq.supabase.co";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_i0SJTtUtx3QYRfGTlgMvFQ_R9TIgK-v";
  const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

  function openFlag(){
    const box=document.getElementById('flagBox'), btn=document.getElementById('flagBtn');
    if(box) box.style.display='block';
    if(btn) btn.style.display='none';
    const ta=document.getElementById('flagText'); if(ta) ta.focus();
  }
  function closeFlag(){
    const box=document.getElementById('flagBox'), btn=document.getElementById('flagBtn');
    if(box) box.style.display='none';
    if(btn) btn.style.display='inline-block';
    const msg=document.getElementById('flagMsg'); if(msg) msg.style.display='none';
  }
  async function submitFlag(){
    const wrap=document.querySelector('.flag-wrap');
    const ta=document.getElementById('flagText');
    const box=document.getElementById('flagBox');
    const msg=document.getElementById('flagMsg');
    const submitBtn=document.getElementById('flagSubmit');
    const comment=(ta && ta.value || '').trim();
    if(!comment){ if(ta) ta.focus(); return; }          // empty guard (matches DB constraint)
    if(submitBtn) submitBtn.disabled=true;
    try{
      const { error } = await sbClient.from('term_flags').insert({
        term_id: wrap ? wrap.dataset.termId : null,
        term_label: wrap ? wrap.dataset.termLabel : null,
        comment
      });
      if(error) throw error;
      if(box) box.style.display='none';
      if(msg){ msg.textContent='Thanks — flagged for review.'; msg.className='flag-msg good'; msg.style.display='block'; }
    }catch(e){
      if(submitBtn) submitBtn.disabled=false;          // re-enable so they can retry
      if(msg){ msg.textContent="Couldn't submit, try again."; msg.className='flag-msg warn'; msg.style.display='block'; }
    }
  }

<script>
let D = {};
let terms = []; // VS05: populated by initTerms() below — live public.vocab_terms, falls back to bundled data.js
let aliases = [], roles = [], skills = [], sources = [], blocked = []; // VS06: only populated if data.js is lazily loaded (Supabase fetch failed)
let currentMode = "simple";
let currentTerm = null;

const index = {};
function norm(s){return String(s||"").toLowerCase().trim()}
function add(k,v,kind){ if(k){ const key=norm(k); if(!index[key]) index[key]={term:v,kind,raw:k}; } }

// VS05: map live public.vocab_terms row (renamed columns) onto the field names the rest of this file expects
function mapVocabRow(row){
  return { ...row,
    id: row.source_id, dimension: row.term_type, roles: row.related_roles||[],
    skills: row.related_skills||[], skillClusters: row.skill_clusters||{},
    doNotConfuse: row.do_not_confuse||[], country: row.country_notes||{}
  };
}

// VS08: bulk fetch excludes skill_clusters/country_notes/do_not_confuse — fetched per-term here instead.
// Cache stores the in-flight/resolved Promise (keyed by source_id) so concurrent calls for the same
// term share one request; failed fetches are evicted from the cache so a later view can retry.
const termDetailCache = new Map();
function fetchTermDetail(sourceId){
  if(!sourceId) return Promise.resolve(null);
  if(termDetailCache.has(sourceId)) return termDetailCache.get(sourceId);
  const p = (async()=>{
    const { data, error } = await sbClient.from('vocab_terms').select('skill_clusters,country_notes,do_not_confuse').eq('source_id', sourceId).maybeSingle();
    if(error) throw error;
    return data ? {
      skillClusters: data.skill_clusters || {},
      country: data.country_notes || {},
      doNotConfuse: data.do_not_confuse || []
    } : null;
  })();
  p.catch(()=>termDetailCache.delete(sourceId));
  termDetailCache.set(sourceId, p);
  return p;
}

// VS08: renderAnswerV2 stays sync/untouched — this wraps it. Skeleton render already happened by the
// time this runs; here we show a placeholder (only where region/skill-cluster/confuse would appear,
// since those are the sections that depend on the per-term detail fetch), fetch the detail, patch it
// onto the same term object (so a later visit to this term skips the fetch entirely via __detailLoaded),
// and re-render — but only if the user hasn't navigated to a different term while the fetch was in flight.
function loadTermDetail(t,q="",found=null){
  if(!t || t.__detailLoaded) return;
  const wrap = document.querySelector('#answer .v2wrap');
  const foot = wrap ? wrap.querySelector('.foot') : null;
  let placeholder = null;
  if(wrap && foot){
    placeholder = document.createElement('div');
    placeholder.className = 'detail-loading';
    placeholder.style.cssText = "margin-top:16px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:.4px;color:#928A7C";
    placeholder.textContent = 'Loading region & skill detail…';
    wrap.insertBefore(placeholder, foot);
  }
  fetchTermDetail(t.id).then(detail=>{
    if(placeholder && placeholder.parentNode) placeholder.remove();
    if(!detail) return;
    Object.assign(t, detail);
    t.__detailLoaded = true;
    if(currentTerm===t) renderAnswerV2(t,q,found);
  }).catch(e=>{
    console.warn('fetchTermDetail failed for', t.id, ':', e && e.message || e);
    if(placeholder && placeholder.parentNode) placeholder.remove();
  });
}

// VS06: data.js (64MB) is no longer a static <script src> tag — it's only injected if the
// live Supabase fetch fails, so a successful page load never requests it.
function loadDataJs(){
  return new Promise((resolve, reject)=>{
    const s=document.createElement('script');
    s.src='data.js';
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error('data.js failed to load'));
    document.head.appendChild(s);
  });
}

async function initTerms(){
  try{
    // Server enforces a max-rows cap (observed: 1000/request) regardless of requested range,
    // so page through in batches until a short page tells us we've reached the end.
    const PAGE = 1000;
    let allRows = [], from = 0;
    while(true){
      const { data, error } = await sbClient.from('vocab_terms').select('source_id,term_type,related_roles,related_skills,term,label,aliases,status,simple,definition,parent').range(from, from + PAGE - 1);
      if(error) throw error;
      allRows = allRows.concat(data || []);
      if(!data || data.length < PAGE) break;
      from += PAGE;
    }
    terms = allRows.map(mapVocabRow);
  }catch(e){
    console.warn('live vocab_terms fetch failed, lazily loading bundled data.js as fallback:', e && e.message || e);
    try{
      await loadDataJs();
      D = window.TALLENTIN_DATA || {};
      terms = D["vocab_terms.json"] || [];
      aliases = D["aliases.json"] || [];
      roles = D["role_titles.json"] || [];
      skills = D["skills.json"] || [];
      sources = D["source_register.json"] || [];
      blocked = D["blocked_terms.json"] || [];
    }catch(e2){
      console.error('data.js fallback also failed:', e2 && e2.message || e2);
      terms = [];
    }
  }
  terms.forEach(t=>{
    add(t.term,t,"preferred term"); add(t.label,t,"preferred term");
    (t.aliases||[]).forEach(a=>add(a,t,"alias"));
    (t.roles||[]).forEach(r=>add(r,t,"role"));
    (t.skills||[]).forEach(s=>add(s,t,"skill"));
  });
  aliases.forEach(a=>{
    const t = terms.find(x=>x.term===a.preferred_term);
    if(t) add(a.alias,t,"alias");
  });
  roles.forEach(r=>{
    const t = terms.find(x=>x.term===r.mapped_term);
    if(t) add(r.role_title,t,"role");
  });
  skills.forEach(s=>{
    const t = terms.find(x=>x.term===s.mapped_term);
    if(t) add(s.skill_name,t,"skill");
  });
  renderMeta();
  renderEmpty();
}

function badge(text,t='neutral'){return `<span class="badge ${t}">${escapeHtml(text)}</span>`}
function tone(v,type){
  if(type==='evidence') return String(v).includes('official')?'good':String(v).includes('open')?'blue':String(v).includes('market')?'warn':'neutral';
  if(type==='bias') return v==='pass'?'good':v==='blocked'?'bad':'warn';
  if(type==='status') return ['verified','practitioner_verified','platform_verified','mature'].includes(v)?'good':['weak','weak_verified','observed','patterned'].includes(v)?'warn':v==='restricted'?'warn':'neutral';
  return 'neutral';
}
function friendlyStatus(v){
  const map={verified:"Verified",open_taxonomy_supported:"Open-source supported",official_verified:"Official-source verified",weak_verified:"Weak verified",practitioner_verified:"Practitioner verified",platform_verified:"Platform verified",mature:"Mature",observed:"Observed",patterned:"Patterned",restricted:"Restricted",pass:"Bias check passed"};
  return map[v] || String(v||"Not available").replaceAll("_"," ");
}
function escapeHtml(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function setMode(mode){
  currentMode=mode;
  document.getElementById("simpleBtn").classList.toggle("active",mode==="simple");
  document.getElementById("explorerBtn").classList.toggle("active",mode==="explorer");
  if(currentTerm){ renderAnswerV2(currentTerm); loadTermDetail(currentTerm); document.getElementById('side').innerHTML=''; document.querySelector('.grid')?.classList.add('is-v2-fullwidth'); }
}
function showToast(msg="Copied"){
  const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),1500);
}
function saveRecent(q){
  if(!q) return;
  let arr=JSON.parse(localStorage.getItem("tallentin_recent")||"[]");
  arr=[q,...arr.filter(x=>norm(x)!==norm(q))].slice(0,6);
  localStorage.setItem("tallentin_recent",JSON.stringify(arr));
  renderRecent();
}
function renderRecent(){
  let arr=JSON.parse(localStorage.getItem("tallentin_recent")||"[]");
  document.getElementById("recent").innerHTML = arr.length ? `<span class="small" style="align-self:center;font-weight:900">Recent:</span>` + arr.map(x=>`<span class="chip" onclick="setQuery('${escapeAttr(x)}')">${escapeHtml(x)}</span>`).join("") : "";
}
function escapeAttr(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;")}

function setQuery(q){document.getElementById("q").value=q; hideSuggestions(); runSearch();}
function renderMeta(){
  const q=['talent acquisition','AI engineer','construction recruiter Canada','SQL','project manager','cybersecurity','quality assurance','data engineer','risk management','contractor','EV battery engineer','space mission operations'];
  document.getElementById('chips').innerHTML=q.map(x=>`<span class="chip" onclick="setQuery('${escapeAttr(x)}')">${escapeHtml(x)}</span>`).join('');
  renderRecent();
}

function allText(t){return norm([t.term,t.label,t.definition,t.simple,(t.aliases||[]).join(" "),(t.roles||[]).join(" "),(t.skills||[]).join(" "),t.dimension,t.parent].join(" "))}
function scoreTerm(t,q){
  const nq=norm(q), label=norm(t.label), term=norm(t.term);
  if(label===nq || term===nq) return 100;
  if((t.aliases||[]).some(a=>norm(a)===nq)) return 94;
  if((t.roles||[]).some(r=>norm(r)===nq)) return 90;
  if((t.skills||[]).some(s=>norm(s)===nq)) return 86;
  let score=0;
  const tokens=nq.split(/\s+/).filter(Boolean);
  const txt=allText(t);
  tokens.forEach(tok=>{ if(txt.includes(tok)) score+=10; if(label.includes(tok)) score+=8; });
  if(txt.includes(nq)) score+=35;
  return score;
}
function findBest(q){
  const nq=norm(q);
  if(index[nq]) return {term:index[nq].term, kind:index[nq].kind, confidence:100};
  const scored=terms.map(t=>({term:t,score:scoreTerm(t,q)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  if(scored.length) return {term:scored[0].term, kind:"best match", confidence:scored[0].score};
  return null;
}
function suggestionsFor(q){
  const nq=norm(q); if(nq.length<2) return [];
  return terms.map(t=>({term:t,score:scoreTerm(t,nq)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,12);
}
function showSuggestions(){
  const q=document.getElementById("q").value;
  const list=suggestionsFor(q);
  const box=document.getElementById("suggestions");
  if(!list.length){ hideSuggestions(); return; }
  const groups={Capability:[],Role:[],Industry:[],Skill:[],Other:[]};

  }

  const seenT=new Set(), titleItems=[];
  const pushTitle=(x,kind)=>{const k=String(x).toLowerCase().trim(); if(!k||seenT.has(k))return; seenT.add(k); titleItems.push({label:titleCase(x),kind});};
  roles.forEach(x=>pushTitle(x,'role')); aliases.forEach(x=>pushTitle(x,'alias'));
  const titleChipHtml=it=>chip(it.label, it.kind==='role'?"Role · search this title":"Alias · also search this", it.kind==='role'?"A job title employers use. Search it on LinkedIn, Indeed or Naukri to surface matching roles.":"Another phrasing employers use for this term. Add it to widen your search.");
  const titlesHtml=titleItems.map(titleChipHtml).join("")||`<span class="emptynote">No titles available.</span>`;
  const covTags=Object.keys(country).map(k=>`<span class="ctag">${esc(code(k))}</span>`).join("");
  const skillChip=x=>chip(x,"Skill · list on resume","List this on your resume so ATS filters and recruiters match it.");
  const sentence=s=>{const x=String(s).replace(/_/g," ");return x.charAt(0).toUpperCase()+x.slice(1);};
  const clusterEntries=Object.entries(clusters);
  const skillsTotal=clusterEntries.length?clusterEntries.reduce((n,[,a])=>n+(Array.isArray(a)?a.length:0),0):skillsFlat.length;
  const skillsRows=clusterEntries.length
    ? clusterEntries.map(([name,arr],i)=>`<div class="crow"><div class="cmeta"><span class="cnum">${String(i+1).padStart(2,"0")}</span><span class="cname">${esc(sentence(name))}</span><span class="ccount">${(Array.isArray(arr)?arr:[]).length}</span></div><div class="kw-list">${(Array.isArray(arr)?arr:[]).map(skillChip).join("")}</div></div>`).join("")
    : `<div class="kw-list">${skillsFlat.map(skillChip).join("")||`<span class="emptynote">No skills available.</span>`}</div>`;
  const isTemplateNote=s=>{const x=String(s||"").toLowerCase();return x.includes("mapping against")&&x.includes("where available")&&x.includes("validate");};
  const regionHtml=Object.entries(country).filter(([k,note])=>!isTemplateNote(note)).map(([k,note])=>`<div class="rcell"><span class="flag">${esc(code(k))}</span><div class="rname">${esc(k)}</div><div class="rnote">${esc(note)}</div></div>`).join("");

  // ---- markup (scoped under .v2wrap) ----
  document.getElementById('answer').innerHTML=`
  <div class="v2wrap">
    ${!verified ? '<div class="draft-banner">⚠ Draft term — not yet verified. This meaning comes from an imported source and is under review.</div>' : ''}
    <div class="v2toprow">
      <div class="toprow-l">
        <span class="kind"><span class="g"></span>${esc(kind)}</span>
        ${verified?`<span class="vrf"><span class="seal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>Human-reviewed</span>`:""}
      </div>
      ${covTags?`<div class="coverage"><span class="covlabel">Covered in</span>${covTags}</div>`:""}
    </div>
    <h1 class="term">${esc(label)}</h1>
    ${verified ? (simple?`<p class="meaning-line">${esc(simple)}</p>`:"") : `<p class="meaning-line">${esc(plainMeaning(t))}</p>`}

    <div class="intent">
      <span class="q">Why are you looking this up?</span>
      <div class="seg">
        <button class="on" id="v2segSeek"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>Find Jobs</button>
        <button id="v2segJD"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Write a Job Post</button>
      </div>
    </div>

    <div class="board">
      <div class="board-head">
        <div class="bt">
          <span class="num">01</span>
          <div>
            <h3 id="v2boardTitle">Search these to find roles</h3>
            <div class="sub" id="v2boardSub">Paste any of these into LinkedIn, Indeed or Naukri — they're the words employers actually use.</div>
          </div>
        </div>
        <button class="copyall" id="v2copyAll"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy all keywords</button>
      </div>
      <div class="section titles">
        <div class="lh"><svg class="ic ic-navy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9"/></svg>Job Titles &amp; Search Terms<span class="cbadge">${titleItems.length}</span></div>
        <div class="kw-list">${titlesHtml}</div>
      </div>
      ${verified ? `<div class="section skills">
        <div class="lh"><svg class="ic ic-ochre" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 2.4 7.4H22l-6 4.5 2.3 7.1-6.3-4.6L5.7 21l2.3-7.1-6-4.5h7.6z"/></svg>Skills to List &amp; Match<span class="cbadge">${skillsTotal}</span></div>
        <div class="skillrows">${skillsRows}</div>
      </div>` : ""}
    </div>

    ${definition?`<div class="define">
      <div class="spine"><span class="mark">“</span></div>
      <div class="dtext">
        <div class="dl">What It Means</div>
        <p>${esc(definition)}</p>
      </div>
    </div>`:""}

    ${regionHtml?`<div class="region-band">
      <div class="rb-head"><div class="rt"><span class="num">03</span><h3>What it means where you're applying</h3></div><span class="hint">By region</span></div>
      <div class="rb-grid">${regionHtml}</div>
    </div>`:""}

    ${verified && dnc.length?`<div class="confuse">
      <div class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg></div>
      <div><div class="ct">Don't Confuse With</div><div class="cv">${dnc.map(d=>`<b>${esc(d)}</b>`).join(" · ")}</div></div>
    </div>`:""}

    <div class="foot">
      ${termId?`<span class="src" id="v2copyId" data-id="${escA(termId)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>${esc(termId)}</span>`:""}
    </div>

    ${!verified?`<div class="flag-wrap" data-term-id="${escA(termId)}" data-term-label="${escA(label)}">
      <button class="secondary" id="flagBtn" onclick="openFlag()">🚩 Flag this term</button>
      <div class="flag-box" id="flagBox" style="display:none">
        <textarea id="flagText" rows="3" maxlength="2000" placeholder="What's wrong with this term? (required)"></textarea>
        <div class="flag-actions">
          <button class="secondary" id="flagSubmit" onclick="submitFlag()">Submit</button>
          <button class="secondary" onclick="closeFlag()">Cancel</button>
        </div>
      </div>
      <div class="flag-msg" id="flagMsg" style="display:none"></div>
    </div>`:""}
  </div>`;

  // ---- interactions (scoped to #answer; reuses global showToast) ----
  const root=document.getElementById('answer');
  const seek=root.querySelector('#v2segSeek'), jd=root.querySelector('#v2segJD');
  const bTitle=root.querySelector('#v2boardTitle'), bSub=root.querySelector('#v2boardSub');
  const setIntent=mode=>{
    const s=mode==='seek';
    if(seek) seek.classList.toggle('on',s);
    if(jd) jd.classList.toggle('on',!s);
    if(bTitle) bTitle.textContent=s?'Search these to find roles':'Include these in your job post';
    if(bSub) bSub.textContent=s?"Paste any of these into LinkedIn, Indeed or Naukri — they're the words employers actually use.":"Drop these into your job description so the right candidates (and search filters) match it.";
  };
  if(seek) seek.addEventListener('click',()=>setIntent('seek'));
  if(jd) jd.addEventListener('click',()=>setIntent('jd'));
  root.querySelectorAll('.kw').forEach(k=>k.addEventListener('click',()=>{
    const v=k.dataset.copy||"";
    if(navigator.clipboard) navigator.clipboard.writeText(v);
    showToast('Copied "'+v+'"');
  }));
  const ca=root.querySelector('#v2copyAll');
  if(ca) ca.addEventListener('click',()=>{
    const all=[...root.querySelectorAll('.kw')].map(k=>k.dataset.copy).join(", ");
    if(navigator.clipboard) navigator.clipboard.writeText(all);
    showToast('All keywords copied');
  });
  const ci=root.querySelector('#v2copyId');
  if(ci) ci.addEventListener('click',()=>{
    const v=ci.dataset.id||"";
    if(navigator.clipboard) navigator.clipboard.writeText(v);
    showToast('Term ID copied');
  });
}
function clusters(t){
  const obj=t.skillClusters||{};
  if(Object.keys(obj).length){
    return Object.entries(obj).map(([c,vals])=>`<div class="cluster"><h4>${escapeHtml(c.replaceAll('_',' '))}</h4><div class="list">${(vals||[]).slice(0,60).map(s=>`<span class="pill" onclick="setQuery('${escapeAttr(s)}')">${escapeHtml(s)}</span>`).join('')}</div></div>`).join('');
  }
  const list=(t.skills||[]).slice(0,120);
  return list.length ? `<div class="list">${list.map(s=>`<span class="pill" onclick="setQuery('${escapeAttr(s)}')">${escapeHtml(s)}</span>`).join("")}</div>` : "<p class='small'>No skill mappings available.</p>";
}
function showPanel(id,ev){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const target=document.getElementById(id); if(target) target.classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if(ev&&ev.target) ev.target.classList.add('active');
}
function scrollToTabs(){document.getElementById("tabs")?.scrollIntoView({behavior:"smooth"});}
function relatedTerms(t){
  return terms.filter(x=>x.id!==t.id && (x.dimension===t.dimension || x.parent===t.parent)).slice(0,10);
}
function startCompare(){
  const box=document.getElementById("compareBox"); if(box){box.classList.add("show"); box.scrollIntoView({behavior:"smooth",block:"center"});}
}
function compareWith(label){
  const other=findBest(label)?.term;
  if(!currentTerm||!other) return;
  document.getElementById("compareResult").innerHTML = `
    <div class="compare-grid">
      ${compareCard(currentTerm)}
      ${compareCard(other)}
    </div>`;
}
function compareCard(t){
  return `<div class="compare-card">
    <h4>${escapeHtml(t.label)}</h4>
    <div class="kv"><div class="k">Type</div><div class="v">${escapeHtml(friendlyStatus(t.dimension))}</div></div>
    <div class="kv"><div class="k">Meaning</div><div class="v">${escapeHtml(plainMeaning(t)).slice(0,260)}</div></div>
    <div class="kv"><div class="k">Skills</div><div class="v">${(t.skills||[]).slice(0,8).map(escapeHtml).join(", ")}</div></div>
    <div class="kv"><div class="k">Avoid when</div><div class="v">${doNotUseWhen(t).slice(0,3).map(escapeHtml).join(", ")}</div></div>
  </div>`;
}
function copySummary(){
  if(!currentTerm) return;
  const t=currentTerm;
  const text=`${t.label} is a ${friendlyStatus(t.dimension)} term. Meaning: ${plainMeaning(t)} Do not confuse it with: ${(t.doNotConfuse||t.excludes||[]).slice(0,5).join(", ") || "adjacent terms requiring review"}. Market rule: Canada, India, and the USA are equal-priority markets.`;
  navigator.clipboard?.writeText(text).then(()=>showToast("Summary copied")).catch(()=>showToast("Copy unavailable"));
}
function renderNoMatch(q){
  document.getElementById('answer').innerHTML = `<div class="card empty"><div class="big">🟡</div><h2>No approved match found</h2><p>“${escapeHtml(q)}” should be treated as a candidate term or alias and reviewed before official use.</p><div class="note warn"><b>Governance rule:</b> unknown terms do not become verified terms automatically.</div></div>`;
  document.getElementById('side').innerHTML = `<div class="card"><h3>Recommended next step</h3><p class="small">Add this to the review queue. Check whether it is an alias, role, skill, tool, industry, risk term, or blocked phrase.</p></div>`;
}
function renderEmpty(){
  document.getElementById('answer').innerHTML = `<div class="card empty"><div class="big">🔎</div><h2>Start with any hiring word.</h2><p>Search by role, skill, industry, capability, alias, or country context.</p><div class="chips" style="justify-content:center"><span class="chip" onclick="setQuery('AI engineer')">Search a role</span><span class="chip" onclick="setQuery('SQL')">Search a skill</span><span class="chip" onclick="setQuery('construction')">Search an industry</span></div></div>`;
  document.getElementById('side').innerHTML = ``;
}
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')runSearch(); if(e.key==='Escape')hideSuggestions();});
document.getElementById('q').addEventListener('input',showSuggestions);
document.addEventListener('click',e=>{if(!e.target.closest('.search-card')) hideSuggestions();});
initTerms(); // VS05: async load from live public.vocab_terms (replaces synchronous renderMeta()/renderEmpty() calls)
</script>
</body>
</html>
